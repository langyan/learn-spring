spring.application.name=lin-spring-elasticsearch
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/productdb?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Elasticsearch
spring.elasticsearch.uris=http://localhost:9200

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.lin.spring.elasticsearch

# Scheduling
spring.task.scheduling.pool.size=2

# Logging
logging.level.org.springframework.data.elasticsearch=DEBUG
logging.level.com.lin.spring.elasticsearch=DEBUG
logging.level.org.springframework.kafka=INFO
