spring:
  datasource:
    url: jdbc:h2:mem:kafkatx_embedded;MODE=LEGACY;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}
    consumer:
      group-id: kafkatx-embedded-test
      enable-auto-commit: false
      auto-offset-reset: earliest
      properties:
        isolation.level: read_committed
    producer:
      acks: all
      transaction-id-prefix: kafkatx-embedded-
      properties:
        enable.idempotence: true
