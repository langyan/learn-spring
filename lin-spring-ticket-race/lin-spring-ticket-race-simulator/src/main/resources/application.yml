server:
  port: 8094

spring:
  application:
    name: ticket-race-simulator
  cloud:
    compatibility-verifier:
      enabled: false

ticket-race:
  booking:
    service-id: ${BOOKING_SERVICE_ID:ticket-race-booking-service}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
