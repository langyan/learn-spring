server:
  port: 8091

spring:
  application:
    name: ticket-race-event-service
  datasource:
    url: ${EVENT_DB_URL:jdbc:postgresql://localhost:5432/ticket_race_event}
    username: ${EVENT_DB_USERNAME:postgres}
    password: ${EVENT_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    time-zone: UTC
  cloud:
    compatibility-verifier:
      enabled: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
