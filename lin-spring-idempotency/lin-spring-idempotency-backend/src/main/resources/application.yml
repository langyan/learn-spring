server:
  port: 8086

spring:
  application:
    name: lin-spring-idempotency-backend
  datasource:
    url: jdbc:h2:mem:idempotencydb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: idempotency-demo-group

app:
  idempotency:
    ttl-hours: 24
  kafka:
    processed-event-ttl-hours: 24
    topics:
      order-created: order.created

logging:
  level:
    org.springframework.kafka: info
    com.lin.spring.idempotency: debug
