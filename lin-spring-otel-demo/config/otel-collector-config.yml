receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318 # Spring Boot 默认推送到 http 端点

processors:
  batch: # 批处理，提高性能
  memory_limiter: # 防止 Collector OOM
    check_interval: 1s
    limit_mib: 1000
  resource: # 统一追加全局属性
    attributes:
      - key: environment
        value: "production"
        action: insert

exporters:
  # 将 OTLP Metrics 转换为 Prometheus 格式，并暴露在 8889 端口
  prometheus:
    endpoint: "0.0.0.0:8889"
    send_timestamps: true
    metric_expiration: 180m
  debug:
    verbosity: normal

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [prometheus, debug]
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug]