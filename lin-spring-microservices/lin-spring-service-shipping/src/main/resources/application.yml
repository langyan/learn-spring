server:
  port: 8084

spring:
  application:
    name: shipping-service
  profiles:
    active: dev
  config:
    import: optional:configserver:http://localhost:8888

eureka:
  client:
    service-url:
      defaultZone: http://admin:password@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    com.lin.spring.service.shipping: DEBUG
