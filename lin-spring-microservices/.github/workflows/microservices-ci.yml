name: Microservices CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: -Xmx3072m

jobs:
  # Build and Test Job
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Eureka Server
        run: |
          cd lin-spring-cloud-eureka
          ./mvnw clean compile

      - name: Build Config Server
        run: |
          cd lin-spring-cloud-config
          ./mvnw clean compile

      - name: Build Gateway
        run: |
          cd lin-spring-cloud-gateway
          ./mvnw clean compile

      - name: Build User Service
        run: |
          cd lin-spring-service-user
          ./mvnw clean compile

      - name: Build Payment Service
        run: |
          cd lin-spring-service-payment
          ./mvnw clean compile

      - name: Build Inventory Service
        run: |
          cd lin-spring-service-inventory
          ./mvnw clean compile

      - name: Build Shipping Service
        run: |
          cd lin-spring-service-shipping
          ./mvnw clean compile

      - name: Build Order Service
        run: |
          cd lin-spring-service-order
          ./mvnw clean compile

      - name: Run Unit Tests - User Service
        run: |
          cd lin-spring-service-user
          ./mvnw test

      - name: Run Unit Tests - Payment Service
        run: |
          cd lin-spring-service-payment
          ./mvnw test

      - name: Run Unit Tests - Inventory Service
        run: |
          cd lin-spring-service-inventory
          ./mvnw test

      - name: Run Unit Tests - Shipping Service
        run: |
          cd lin-spring-service-shipping
          ./mvnw test

      - name: Run Unit Tests - Order Service
        run: |
          cd lin-spring-service-order
          ./mvnw test

      - name: Generate Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: '**/target/surefire-reports/*.xml'
          reporter: java-junit
          fail-on-error: false

  # Security Scan Job
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Docker Build Job
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service:
          - lin-spring-cloud-eureka
          - lin-spring-cloud-config
          - lin-spring-cloud-gateway
          - lin-spring-service-user
          - lin-spring-service-order
          - lin-spring-service-payment
          - lin-spring-service-inventory
          - lin-spring-service-shipping

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Build ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image - ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: lin-spring/${{ matrix.service }}:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Image - ${{ matrix.service }}
        run: |
          docker images | grep ${{ matrix.service }}

  # Integration Test Job
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Docker Compose
        run: |
          cd docker
          docker-compose up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to start..."
          sleep 60

      - name: Check Eureka Server
        run: |
          curl -f http://localhost:8761/actuator/health || exit 1

      - name: Check User Service
        run: |
          curl -f http://localhost:8085/actuator/health || exit 1

      - name: Check Payment Service
        run: |
          curl -f http://localhost:8082/actuator/health || exit 1

      - name: Check Inventory Service
        run: |
          curl -f http://localhost:8083/actuator/health || exit 1

      - name: Check Shipping Service
        run: |
          curl -f http://localhost:8084/actuator/health || exit 1

      - name: Check Order Service
        run: |
          curl -f http://localhost:8081/actuator/health || exit 1

      - name: Check Gateway
        run: |
          curl -f http://localhost:8080/actuator/health || exit 1

      - name: View logs
        if: failure()
        run: |
          cd docker
          docker-compose logs

      - name: Stop Docker Compose
        if: always()
        run: |
          cd docker
          docker-compose down -v

  # Deploy Job (placeholder for actual deployment)
  deploy:
    name: Deploy to Environment
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "Deploy notification placeholder"
          echo "In production, this would deploy to your environment"
          echo "Services deployed:"
          echo "  - Eureka Server: http://localhost:8761"
          echo "  - Config Server: http://localhost:8888"
          echo "  - API Gateway: http://localhost:8080"
          echo "  - User Service: http://localhost:8085"
          echo "  - Order Service: http://localhost:8081"
          echo "  - Payment Service: http://localhost:8082"
          echo "  - Inventory Service: http://localhost:8083"
          echo "  - Shipping Service: http://localhost:8084"
