# Shipping Service Configuration
server:
  port: 8084

spring:
  application:
    name: shipping-service
  datasource:
    url: jdbc:h2:mem:shippingdb
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://admin:password@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.lin.spring.service.shipping: DEBUG
