server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        # Use native file system for configuration storage
        native:
          search-locations: classpath:/config
        # Uncomment below to use Git-based configuration
        # git:
        #   uri: file://${user.home}/config-repo
        #   search-paths: services
        #   clone-on-start: true
  profiles:
    active: native

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://admin:password@localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    appname: config-server

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,refresh
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    org.springframework.cloud.config: DEBUG
